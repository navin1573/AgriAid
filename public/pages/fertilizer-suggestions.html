<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertilizer Suggestions | AgriAid</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img src="/assets/img/logo.png" alt="AgriAid Logo" class="logo-img">
                <div class="logo-text">AgriAid</div>
            </div>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/index.html#prediction">Predictions</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="/pages/login.html" class="btn">Login</a>
            </div>
        </nav>
    </header>

    <section class="analysis-section">
        <div class="analysis-container">
            <h2>Fertilizer Recommendation Tool</h2>
            <form class="analysis-form" action="/pages/fertilizer-results.html" method="GET">
                <div class="form-group">
                    <label for="district">District</label>
                    <select id="district" name="district" required>
                        <option value="">Select district</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="soil-color">Soil Color</label>
                    <select id="soil-color" name="soil-color" required>
                        <option value="">Select soil color</option>
                        <option value="Black">Black</option>
                        <option value="Red">Red</option>
                        <option value="Brown">Brown</option>
                        <option value="Loamy">Loamy</option>
                        <option value="Sandy">Sandy</option>
                        <option value="Clayey">Clayey</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="crop">Crop</label>
                    <select id="crop" name="crop" required>
                        <option value="">Select crop</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nitrogen">Nitrogen (N)</label>
                    <input type="number" id="nitrogen" name="nitrogen" min="0" max="500" required>
                </div>

                <div class="form-group">
                    <label for="phosphorus">Phosphorus (P)</label>
                    <input type="number" id="phosphorus" name="phosphorus" min="0" max="500" required>
                </div>

                <div class="form-group">
                    <label for="potassium">Potassium (K)</label>
                    <input type="number" id="potassium" name="potassium" min="0" max="500" required>
                </div>

                <div class="form-group">
                    <label for="ph">Soil pH</label>
                    <input type="number" id="ph" name="ph" min="0" max="14" step="0.1" required>
                </div>

                <div class="form-group">
                    <label for="rainfall">Rainfall (mm)</label>
                    <input type="number" id="rainfall" name="rainfall" min="0" required>
                </div>

                <div class="form-group">
                    <label for="temperature">Temperature (C)</label>
                    <input type="number" id="temperature" name="temperature" step="0.1" required>
                </div>

                <button type="submit" class="btn">Get Fertilizer Suggestion</button>
            </form>
        </div>
    </section>

    <footer>
        <p class="copyright">&copy; 2025 AgriAid. All rights reserved.</p>
    </footer>

    <script src="/assets/js/fertilizer-data.js"></script>
    <script>
        function uniqueValues(key) {
            if (typeof fertilizerData === 'undefined' || !Array.isArray(fertilizerData)) {
                return [];
            }
            return [...new Set(fertilizerData.map(item => item[key]).filter(Boolean))].sort();
        }

        function populateSelect(selectId, values) {
            const select = document.getElementById(selectId);
            const current = select.value;
            values.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                select.appendChild(option);
            });
            if (current) {
                select.value = current;
            }
        }

        function setValueIfPresent(id, value) {
            if (value === null || value === '') {
                return;
            }
            const element = document.getElementById(id);
            if (element) {
                if (element.tagName === 'SELECT') {
                    const normalize = (text) => String(text).toLowerCase().replace(/[^a-z0-9]/g, '');
                    const normalized = normalize(value);
                    const matchingOption = Array.from(element.options).find(option =>
                        normalize(option.value) === normalized
                    );
                    if (matchingOption) {
                        element.value = matchingOption.value;
                    }
                } else {
                    element.value = value;
                }
            }
        }

        function prefillFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const toNumberString = (value) => (value === null ? '' : value);

            setValueIfPresent('district', params.get('district'));
            setValueIfPresent('soil-color', params.get('soil-color'));
            setValueIfPresent('crop', params.get('crop'));

            setValueIfPresent('nitrogen', toNumberString(params.get('nitrogen') || params.get('N')));
            setValueIfPresent('phosphorus', toNumberString(params.get('phosphorus') || params.get('P')));
            setValueIfPresent('potassium', toNumberString(params.get('potassium') || params.get('K')));
            setValueIfPresent('ph', toNumberString(params.get('ph')));
            setValueIfPresent('rainfall', toNumberString(params.get('rainfall')));
            setValueIfPresent('temperature', toNumberString(params.get('temperature')));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const districts = uniqueValues('District_Name');
            const crops = uniqueValues('Crop');

            populateSelect('district', districts);
            populateSelect('crop', crops);
            prefillFromQuery();

            document.querySelector('.analysis-form').addEventListener('submit', function (e) {
                if (!this.checkValidity()) {
                    e.preventDefault();
                    alert('Please fill all required fields correctly.');
                }
            });
        });
    </script>
</body>
</html>
